[mod-setting-name]
ww-auto-claim=Auto-assign worlds on join
ww-require-online=Targets must be online
ww-invasion-duration=Invasion duration (minutes)
ww-beachhead-distance=Beachhead distance from spawn (tiles)
ww-post-invasion-truce=Post-invasion truce (minutes)

[mod-setting-description]
ww-auto-claim=When a player joins for the first time, automatically create their personal world and move them there. If disabled, players use the /ww-claim command.
ww-require-online=Invasions can only target players who are currently connected. Strongly recommended.
ww-invasion-duration=Maximum length of a single invasion before the wormhole collapses and pulls the invader home.
ww-beachhead-distance=How far from the defender's spawn the invader arrives. Larger values give defenders more warning.
ww-post-invasion-truce=Automatic grace period between the two parties after an invasion ends for any reason other than a signed treaty. Set to 0 to disable.

[space-location-name]
ww-wormhole=Wormhole
[space-location-description]
ww-wormhole=A tear in spacetime past Aquilo. Platforms that park here can send raiders through to other engineers' worlds.

[space-connection-name]
aquilo-ww-wormhole=Aquilo - Wormhole

[technology-name]
ww-wormhole-stabilization=Wormhole stabilization
[technology-description]
ww-wormhole-stabilization=Stabilize the anomaly beyond Aquilo, allowing space platforms to approach the wormhole and send raiders through it.

[shortcut-name]
ww-invade=Wormhole invasion
ww-diplomacy=Diplomacy

[ww-cmd]
claim=Claim your personal world (creates your force and homeworld).
retreat=Call off your current invasion and return home.

[ww-msg]
welcome=[color=orange]Wormhole Warfare:[/color] every engineer gets a world. Research Wormhole stabilization, fly past Aquilo, and invade your rivals — or sign treaties instead.
already-claimed=You have already claimed a world.
force-cap=Cannot create more worlds: the game's force limit has been reached.
world-claimed=[color=orange]__1__ has claimed a world.[/color]
cannot-self=You cannot invade yourself.
claim-first=Claim your own world first (/ww-claim).
no-world=That player has no claimed world.
target-offline=That player is offline.
ceasefire-active=A ceasefire is in effect with that player.
already-at-war=That player is already involved in an invasion.
you-at-war=You are already involved in an invasion.
not-at-wormhole=You must be aboard a platform parked at the Wormhole to launch an invasion.
not-invading=You are not currently invading anyone.
arrived-at-wormhole=[color=orange]The platform has reached the Wormhole. Open the invasion shortcut to pick a target.[/color]
invasion-started=[color=red]⚔ __1__ has invaded __2__'s world![/color]
invasion-ended=[color=orange]⚔ Invasion of __2__'s world by __1__ is over (__3__). War score: __4__, kills: __5__.[/color]
both-need-worlds=Both parties need claimed worlds to sign contracts.
tribute-needs-count=Set a tribute amount greater than zero, or clear the item for a white peace.
no-target-selected=No target selected.
contract-sent=Contract proposed to __1__.
contract-received=[color=orange]__1__ has proposed a contract. Open Diplomacy to review it.[/color]
contract-accepted=[color=green]Treaty signed between __1__ and __2__: ceasefire for __3__ minutes.[/color]
contract-rejected=__1__ rejected your contract.
contract-cancelled=__1__ withdrew their contract.
proposer-offline=The proposer is offline; the contract cannot be executed right now.
insufficient-tribute=__1__ does not carry the tribute (__2__ × __3__).
ceasefire-expired=[color=red]The ceasefire between __1__ and __2__ has expired. Hostilities may resume.[/color]

